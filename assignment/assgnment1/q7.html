<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
</head>

<body id="btn">
    <div id="box" style="height: 150px; width: 150px; background-color: salmon">
        Box
    </div>

    <script>
        const btn = document.getElementById('btn');

        btn.addEventListener('mouseover', () => {
            setTimeout(() => {
                const box = document.getElementById('box');
                box.style.display = 'none';
            }, 1000);
        });

    </script>
</body>

</html>
